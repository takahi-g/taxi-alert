<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAXI ALERT Pro</title>
    <meta name="description" content="タクシードライバー特化型 ゲリラ豪雨・特需アラートアプリ">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <!-- ポップアップ通知用コンテナ -->
    <div id="toast-container" class="toast-container"></div>

    <header class="app-header">
        <h1>TAXI ALERT</h1>
        <div style="display: flex; align-items: center; gap: 8px;">
            <button id="enable-notif-btn" class="notif-btn" style="display: none;">🔊 音声・通知を許可</button>
            <button id="test-night-btn" class="notif-btn" style="background:var(--accent-warning);">🌙 深夜</button>
            <button id="test-airport-btn" class="notif-btn" style="background:#0071c5;">✈️ 空港</button>
            <button id="test-countdown-btn" class="notif-btn" style="background:#e91e63;">⌛️ 終了テ</button>
            <div class="status-indicator">
                <span id="update-time">更新中...</span>
            </div>
        </div>
    </header>

    <!-- 電車遅延バナー（緊急時のみ表示） -->
    <div id="train-banner" class="train-banner" style="display: none;"></div>

    <main class="container">
        <!-- 総合ステータス -->
        <section id="alert-status-card" class="card status-safe">
            <div class="card-header">
                <h2>現在の需要ステータス</h2>
            </div>
            <div class="card-body">
                <div id="status-icon" class="status-icon">✅</div>
                <h3 id="status-message">通常営業・安全圏</h3>
                <p id="status-detail">現在地周辺で特段の需要増（雨雲など）は予測されていません。</p>
            </div>
        </section>

        <!-- イベント終了カウントダウン表示 (動的に表示) -->
        <section id="countdown-card" class="card countdown-card" style="display: none;">
            <div class="card-header">
                <h2>⌛️ 次のイベント終了予測</h2>
            </div>
            <div class="card-body">
                <h3 id="cd-event-name">PayPayドーム (ライブ)</h3>
                <div class="countdown-timer">
                    <span id="cd-minutes">00</span>:<span id="cd-seconds">00</span>
                </div>
                <p id="cd-status-text">まもなく終了。待機ポジションを確保してください！</p>
            </div>
        </section>

        <!-- 雨雲・特需情報 -->
        <section class="card data-card">
            <div class="card-header">
                <h2>1時間以内の降水予測 (現在地)</h2>
            </div>
            <div class="card-body">
                <div class="weather-data">
                    <span id="rain-prob" class="data-huge">--%</span>
                    <span class="data-label">降水確率</span>
                </div>
                <div class="weather-details">
                    <p>予想降水量: <strong id="rain-amount">-- mm/h</strong></p>
                    <p>現在地: <span id="location-name">取得中...</span></p>
                </div>
            </div>
        </section>

        <!-- マップ表示 -->
        <section class="card">
            <div class="card-header">
                <h2>📍 現在地と特需発生エリア</h2>
            </div>
            <div class="card-body" style="padding: 0;">
                <!-- 地図用のコンテナ -->
                <div id="map" style="height: 350px; border-radius: 8px;"></div>
            </div>
        </section>

        <!-- イベント・特需情報 -->
        <section id="event-card" class="card">
            <div class="card-header">
                <h2>🔔 近隣の特需・イベント予測 (近日中)</h2>
            </div>
            <div class="card-body">
                <ul id="event-list" class="event-list">
                    <li><span class="place">情報を読み込み中...</span></li>
                </ul>
            </div>
        </section>
    </main>

    <script src="weather.js?v=4"></script>
    <script src="map.js?v=4"></script>
    <script src="notifications.js?v=4"></script>
    <script src="events.js?v=4"></script>
    <script src="train.js?v=4"></script>
    <script src="night_radar.js?v=5"></script>
    <script src="airport.js?v=5"></script>
    <script src="event_countdown.js?v=5"></script>
    <script src="main.js?v=5"></script>
</body>
</html>
